spring.application.name=ai-assistant
spring.main.web-application-type=none
spring.ai.google.genai.chat.options.model=gemini-2.5-flash
spring.ai.google.genai.embedding.text.options.model=gemini-embedding-001
spring.ai.google.genai.embedding.api-key=${spring.ai.google.genai.api-key}
# set spring.ai.google.genai.api-key in application-default.properties (gitignored)

# Max tool-call roundtrips for a single sub-task delegation before abort.
ai.subtask.max-iterations=10
# Max tool-call roundtrips for the main chat (say) before abort.
ai.assistant.max-iterations=15
